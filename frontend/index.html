<!DOCTYPE html>
<html>
<head>
    <title>Secure Auction</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Register</h2>
<input id="r_user" placeholder="username">
<input id="r_pass" placeholder="password">
<button type="button" onclick="register()">Register</button>
<p id="register_status"></p>

<h2>Login</h2>
<input id="l_user" placeholder="username">
<input id="l_pass" placeholder="password">
<button type="button" onclick="login()">Login</button>

<p id="login_status"></p>

<h2>Commit</h2>
<input id="bid" placeholder="bid">
<input id="salt" placeholder="salt" readonly>
<button type="button" onclick="generateSalt()">Generate Salt</button>
<p id="salt_info"></p>
<button type="button" onclick="copySalt()">Copy Salt</button>
<button type="button" onclick="commit()">Commit</button>
<p id="commit_status"></p>

<h2>Reveal</h2>
<input id="rbid" placeholder="bid">
<input id="rsalt" placeholder="salt">
<button type="button" onclick="reveal()">Reveal</button>
<p id="reveal_status"></p>

<h2>Winner</h2>
<button type="button" onclick="winner()">Get Winner</button>
<p id="winner_status"></p>

<script>
let user_id = null;

function register() {
    fetch("http://127.0.0.1:5000/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("r_user").value,
            password: document.getElementById("r_pass").value
        })
    })
    .then(async (r) => {
        const data = await r.json();
        if (!r.ok) {
            throw new Error(data.error || "Registration failed.");
        }
        return data;
    })
    .then(data => {
        document.getElementById("register_status").innerText = data.message || "Registration completed.";
    })
    .catch(err => {
        document.getElementById("register_status").innerText = err.message;
    });
}

function login() {
    fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("l_user").value,
            password: document.getElementById("l_pass").value
        })
    })
    .then(async (r) => {
        const data = await r.json();
        if (!r.ok) {
            throw new Error(data.error || "Login failed.");
        }
        return data;
    })
    .then(data => {
        user_id = data.user_id;
        document.getElementById("login_status").innerText = data.message;
    })
    .catch(err => {
        document.getElementById("login_status").innerText = err.message;
    });
}

function generateSalt() {
    const random = Math.random().toString(36).substring(2, 10);
    document.getElementById("salt").value = random;
}

function copySalt() {
    const salt = document.getElementById("salt").value;
    if (!salt) {
        alert("No salt to copy!");
        return;
    }
    navigator.clipboard.writeText(salt);
    alert("Salt copied!");
}

function commit() {
    if(!user_id){
        alert("Login first!");
        return;
    }

    const bidValue = parseInt(document.getElementById("bid").value);
    if (isNaN(bidValue)) {
        alert("Please enter a valid bid!");
        return;
    }

    const saltValue = document.getElementById("salt").value;
    if(!saltValue){
        alert("Please generate a salt first!");
        return;
    }

    fetch("http://127.0.0.1:5000/commit", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_id: user_id,
            auction_id: 1,
            bid: bidValue,
            salt: saltValue
        })
    })
    .then(async (r) => {
        const data = await r.json();
        if (!r.ok) {
            throw new Error(data.error || "Commit failed.");
        }
        return data;
    })
    .then(data => {
        document.getElementById("commit_status").innerText = data.message || "Commit completed.";
        document.getElementById("salt_info").innerText = "IMPORTANT: Save this salt for reveal -> " + saltValue;
    })
    .catch(err => {
        document.getElementById("commit_status").innerText = err.message;
    });
}

function reveal() {
    if(!user_id){
        alert("Login first!");
        return;
    }

    const bidValue = parseInt(document.getElementById("rbid").value);
    const revealSalt = document.getElementById("rsalt").value;

    if (isNaN(bidValue)) {
        alert("Please enter a valid bid!");
        return;
    }

    if (!revealSalt) {
        alert("Please enter your salt!");
        return;
    }

    fetch("http://127.0.0.1:5000/reveal", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_id: user_id,
            auction_id: 1,
            bid: bidValue,
            salt: revealSalt
        })
    })
    .then(async (r) => {
        const data = await r.json();
        if (!r.ok) {
            throw new Error(data.error || "Reveal failed.");
        }
        return data;
    })
    .then(data => {
        document.getElementById("reveal_status").innerText = data.message || "Reveal processed.";
    })
    .catch(err => {
        document.getElementById("reveal_status").innerText = err.message;
    });
}

function winner() {
    fetch("http://127.0.0.1:5000/winner/1")
    .then(async (r) => {
        const data = await r.json();
        if (!r.ok) {
            throw new Error(data.error || "Failed to get winner.");
        }
        return data;
    })
    .then(data => {
        document.getElementById("winner_status").innerText = data.message || ("Winner: " + data.winner + " with bid " + data.bid);
    })
    .catch(err => {
        document.getElementById("winner_status").innerText = err.message;
    });
}
</script>

</body>
</html>
